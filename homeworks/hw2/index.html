<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework 2 - CSS Flexbox Layout</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.15);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #a7f3d0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .meta {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
        }

        .badge {
            background: var(--accent-glow);
            color: var(--accent);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .flex-demo {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .flex-item {
            flex: 1 1 calc(33.333% - 8px);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            min-width: 120px;
        }

        .flex-item h3 {
            margin: 0 0 5px 0;
            color: #fff;
            font-size: 1.1rem;
        }

        .flex-item p {
            margin: 0;
            font-size: 0.85rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s ease;
        }

        .back-link:hover {
            transform: translateX(-4px);
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">Course Homework</span>
        <h1>Homework 2: CSS Flexbox Layout</h1>
        <div class="meta">
            <span>Date: Nov 2025</span>
            <span>Category: CSS Styling</span>
        </div>

        <p>This homework focuses on implementing modern responsive layouts using CSS Flexbox layout engine without float hacks.</p>

        <div class="flex-demo">
            <div class="flex-item">
                <h3>Card 1</h3>
                <p>Flex Item 1</p>
            </div>
            <div class="flex-item">
                <h3>Card 2</h3>
                <p>Flex Item 2</p>
            </div>
            <div class="flex-item">
                <h3>Card 3</h3>
                <p>Flex Item 3</p>
            </div>
        </div>

        <a href="../../index.html" class="back-link">&larr; Back to Portfolio</a>
    </div>
</body>
</html>
