<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Project 1 - Interactive Calculator</title>
    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent: #f59e0b;
            --accent-glow: rgba(245, 158, 11, 0.15);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #fef3c7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .meta {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
        }

        .badge {
            background: var(--accent-glow);
            color: var(--accent);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 25px;
            text-align: center;
            max-width: 450px;
        }

        /* Calculator UI */
        .calculator {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            width: 280px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .calc-screen {
            width: 100%;
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 15px;
            box-sizing: border-box;
            font-size: 1.5rem;
            font-weight: 500;
            color: #fff;
            overflow: hidden;
        }

        .calc-keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .calc-key {
            height: 50px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .calc-key:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .calc-key.operator {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: var(--accent);
        }

        .calc-key.operator:hover {
            background: rgba(245, 158, 11, 0.2);
        }

        .calc-key.equal {
            background: var(--accent);
            color: #000;
            font-weight: 600;
        }

        .calc-key.equal:hover {
            background: #d97706;
        }

        .calc-key.clear {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .calc-key.clear:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s ease;
            align-self: flex-start;
        }

        .back-link:hover {
            transform: translateX(-4px);
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">Personal Project</span>
        <h1>Calculator Application</h1>
        <div class="meta">
            <span>Date: Jan 2026</span>
            <span>Stack: HTML / CSS / JS</span>
        </div>

        <p>A simple fully-functioning calculator utility showcasing modular arithmetic code and interactive DOM manipulation.</p>

        <div class="calculator">
            <div class="calc-screen" id="screen">0</div>
            <div class="calc-keys">
                <button class="calc-key clear" onclick="clearScreen()">C</button>
                <button class="calc-key operator" onclick="press('/')">&divide;</button>
                <button class="calc-key operator" onclick="press('*')">&times;</button>
                <button class="calc-key operator" onclick="press('-')">&minus;</button>
                
                <button class="calc-key" onclick="press('7')">7</button>
                <button class="calc-key" onclick="press('8')">8</button>
                <button class="calc-key" onclick="press('9')">9</button>
                <button class="calc-key operator" onclick="press('+')">+</button>
                
                <button class="calc-key" onclick="press('4')">4</button>
                <button class="calc-key" onclick="press('5')">5</button>
                <button class="calc-key" onclick="press('6')">6</button>
                <button class="calc-key equal" style="grid-row: span 2; height: 108px;" onclick="calculate()">=</button>
                
                <button class="calc-key" onclick="press('1')">1</button>
                <button class="calc-key" onclick="press('2')">2</button>
                <button class="calc-key" onclick="press('3')">3</button>
                
                <button class="calc-key" style="grid-column: span 2;" onclick="press('0')">0</button>
                <button class="calc-key" onclick="press('.')">.</button>
            </div>
        </div>

        <a href="../../index.html" class="back-link">&larr; Back to Portfolio</a>
    </div>

    <script>
        const screen = document.getElementById('screen');
        let currentInput = '';

        function press(val) {
            if (currentInput === '0' && val !== '.') {
                currentInput = val;
            } else {
                currentInput += val;
            }
            updateScreen();
        }

        function clearScreen() {
            currentInput = '0';
            updateScreen();
        }

        function calculate() {
            try {
                // Avoid using eval in real productions, but fine for a simple showcase calc
                let result = eval(currentInput.replace('&times;', '*').replace('&divide;', '/'));
                currentInput = String(result);
            } catch(e) {
                currentInput = 'Error';
            }
            updateScreen();
        }

        function updateScreen() {
            screen.textContent = currentInput || '0';
        }
    </script>
</body>
</html>
